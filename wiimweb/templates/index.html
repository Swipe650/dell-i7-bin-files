<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiiM Web Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <style>
        /* Your existing CSS (unchanged) */
        :root {
            --bg-color: #1e1e2f;
            --text-color: #e0e0e0;
            --card-bg: #2a2a3a;
            --button-bg: #2a2a3a;
            --button-hover: #3a3a4a;
            --border-color: #444;
            --track-hover: #3a3a4a;
            --dropdown-bg: #2a2a3a;
            --shuffle-active-bg: #555555;
            --shuffle-active-color: #ffffff;
        }
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1400px;
            margin: auto;
        }
        .left-panel {
            flex: 0 1 320px;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .right-panel {
            display: flex;
            flex-direction: column;
            flex: 2.2;
            min-width: 300px;
        }
        .preset-dropdown {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            background: var(--dropdown-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }
        .filter-input {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            background: var(--dropdown-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
        }
        .track-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            padding: 15px;
            max-height: calc(100vh - 140px);
        }
        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .track-item:hover {
            background: var(--track-hover);
        }
        .track-thumb {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 4px;
            background: #888;
            flex-shrink: 0;
        }
        .track-info {
            flex: 1;
        }
        .track-title {
            font-weight: bold;
        }
        .track-artist {
            font-size: 0.85em;
            opacity: 0.8;
        }
        .album-art img {
            max-width: 100%;
            max-height: 325px;
            width: auto;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .now-playing-text {
            width: 100%;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            align-items: baseline;
        }
        .now-playing-text > div {
            display: contents;
        }
        .now-playing-text > div strong {
            text-align: right;
            white-space: nowrap;
        }
        .now-playing-text > div span {
            text-align: left;
        }
        .quality {
            font-size: 0.85em;
            opacity: 0.8;
        }
        .seek-container {
            width: 100%;
            margin: 10px 0;
        }
        .seek-times {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            margin-bottom: 5px;
        }
        .seek-container input {
            width: 100%;
        }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
            width: 100%;
            flex-wrap: wrap;
        }
        button {
            cursor: pointer;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button:hover {
            background: var(--button-hover);
            border-color: var(--text-color);
        }
        .controls button {
            padding: 6px 12px;
            min-width: 50px;
        }
        button svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .volume {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-top: 5px;
        }
        .volume input {
            flex: 1;
        }
        #shuffleBtn.active {
            background-color: var(--shuffle-active-bg);
            color: var(--shuffle-active-color);
            border-color: var(--shuffle-active-bg);
        }
        #muteBtn {
            background-color: transparent;
            color: var(--text-color);
            padding: 6px 10px;
            min-width: 44px;
            border: none;
        }
        #muteBtn:hover {
            background-color: rgba(128, 128, 128, 0.2);
        }
        #muteBtn.muted {
            color: #dc3545;
        }
        .filter-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        .filter-header input {
            flex: 1;
        }
        @media (max-width: 800px) {
            .container {
                flex-direction: column;
            }
            .controls {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="album-art">
                <img id="albumArt" src="" alt="Album Art" style="display: none;">
            </div>
            <div class="now-playing-text">
                <div><strong>Track:</strong> <span id="trackTitle">-</span></div>
                <div><strong>Artist:</strong> <span id="trackArtist">-</span></div>
                <div><strong>Album:</strong> <span id="trackAlbum">-</span></div>
                <div class="quality"><strong>Quality:</strong> <span id="quality">-</span></div>
            </div>
            <div class="seek-container">
                <div class="seek-times">
                    <span id="position">00:00:00</span>
                    <span id="duration">00:00:00</span>
                </div>
                <input type="range" id="seekSlider" min="0" max="100" value="0" step="0.1">
            </div>
            <div class="controls">
                <button onclick="sendCmd('previous')" title="Previous"><i data-feather="skip-back"></i></button>
                <button id="playPauseBtn" onclick="togglePlayPause()" title="Play/Pause"><i data-feather="play"></i></button>
                <button onclick="sendCmd('next')" title="Next"><i data-feather="skip-forward"></i></button>
                <button id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle"><i data-feather="shuffle"></i></button>
            </div>
            <div class="volume">
                <button id="muteBtn" onclick="toggleMute()" title="Mute"><i data-feather="volume-2"></i></button>
                <input type="range" min="0" max="100" step="1" id="volumeSlider" onchange="setVolume(this.value)">
                <span id="volumeValue">50</span>
            </div>
        </div>

        <div class="right-panel">
            <select id="presetSelect" class="preset-dropdown">
                <option value="">Select preset...</option>
                {% for p in presets %}
                <option value="{{ p }}">{{ preset_names[p] }}</option>
                {% endfor %}
            </select>
            <div class="track-list">
                <h3 style="margin: 0 5px 5px 5px;">Playlist Tracks</h3>
                <div class="filter-header">
                    <input type="text" id="filterInput" class="filter-input" placeholder="Filter tracks (title, artist, album)...">
                </div>
                <div id="trackList"></div>
            </div>
        </div>
    </div>

<script>
    let shuffleActive = false;
    let seeking = false;
    let currentStatus = { position_sec: 0, duration_sec: 1, album_art: "" };
    let muted = false;
    let allTracks = [];
    let filterKeyword = "";
    let isPlaying = false;
    let playPauseBusy = false;

    // ==================== Helper Functions ====================
    async function sendCmd(cmd) {
        try {
            const response = await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cmd: cmd })
            });
            if (!response.ok) console.error(`Command ${cmd} failed`);
        } catch(e) {
            console.error(`sendCmd error: ${e}`);
        }
    }

    function updatePlayPauseIcon(playing) {
        const btn = document.getElementById('playPauseBtn');
        if (!btn) return;
        const iconName = playing ? 'pause' : 'play';
        btn.innerHTML = `<i data-feather="${iconName}"></i>`;
        feather.replace();
    }

    async function togglePlayPause() {
        if (playPauseBusy) return;
        playPauseBusy = true;

        // Get accurate playback state from device
        let shouldPlay = false;
        try {
            const resp = await fetch('/api/transport_state');
            const data = await resp.json();
            shouldPlay = !data.playing;
            console.log("Transport state:", data.state, "shouldPlay:", shouldPlay);
        } catch(e) {
            console.error("Failed to get transport state", e);
            playPauseBusy = false;
            return;
        }

        // Optimistic UI update
        isPlaying = shouldPlay;
        updatePlayPauseIcon(isPlaying);

        const cmd = shouldPlay ? 'play' : 'pause';
        try {
            await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cmd: cmd })
            });
        } catch(e) {
            console.error(`Command ${cmd} failed:`, e);
            // revert optimistic update
            isPlaying = !shouldPlay;
            updatePlayPauseIcon(isPlaying);
        }
        setTimeout(() => { playPauseBusy = false; }, 500);
    }
    
    async function syncPlayPauseIcon() {
        try {
            const resp = await fetch('/api/transport_state');
            const data = await resp.json();
            if (data.playing !== isPlaying) {
                isPlaying = data.playing;
                updatePlayPauseIcon(isPlaying);
            }
        } catch(e) { console.error("syncPlayPauseIcon error", e); }
    }

    // Call it every 500 ms (or keep 1000 ms if you prefer)
    setInterval(syncPlayPauseIcon, 500);

    // ==================== Playlist & Track Functions ====================
    function filterTracks() {
        if (!filterKeyword) {
            renderTrackList(allTracks);
            return;
        }
        const filtered = allTracks.filter(track => {
            return (track.title && track.title.toLowerCase().includes(filterKeyword)) ||
                   (track.artist && track.artist.toLowerCase().includes(filterKeyword)) ||
                   (track.album && track.album.toLowerCase().includes(filterKeyword));
        });
        renderTrackList(filtered);
    }

    function renderTrackList(tracks) {
        const container = document.getElementById('trackList');
        container.innerHTML = '';
        tracks.forEach(track => {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <img class="track-thumb" src="${escapeHtml(track.album_art || '')}" alt="cover" onerror="this.style.display='none'">
                <div class="track-info">
                    <div class="track-title">${track.originalIndex + 1}. ${escapeHtml(track.title || 'Unknown')}</div>
                    <div class="track-artist">${escapeHtml(track.artist || '')} ${track.album ? '– ' + escapeHtml(track.album) : ''}</div>
                </div>
            `;
            div.onclick = () => playTrack(track.originalIndex + 1);
            container.appendChild(div);
        });
    }

    async function loadTracks() {
        const resp = await fetch('/api/tracks');
        const tracks = await resp.json();
        allTracks = tracks.map((track, idx) => ({ ...track, originalIndex: idx }));
        filterTracks();
    }

    async function playTrack(trackNum) {
        await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cmd: `playtrack:${trackNum}`})
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== Preset & UI Sync ====================
    async function updateCurrentPreset() {
        console.log("updateCurrentPreset called");
        try {
            const resp = await fetch('/api/current_playlist');
            const data = await resp.json();
            const fullName = data.playlist_name;
            if (!fullName) return;
            let baseName = fullName.replace(/_\#~.*$/, '');
            const dropdown = document.getElementById('presetSelect');
            for (let i = 0; i < dropdown.options.length; i++) {
                if (dropdown.options[i].text === baseName) {
                    dropdown.selectedIndex = i;
                    break;
                }
            }
        } catch(e) { console.error("updateCurrentPreset error:", e); }
    }

    async function sendPreset(num) {
        await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cmd: `preset:${num}`})
        });
        setTimeout(() => {
            loadTracks();
            getShuffleStatus();
            updateCurrentPreset();
        }, 1000);
    }

    // ==================== Shuffle ====================
    async function getShuffleStatus() {
        const resp = await fetch('/api/loopmode');
        const data = await resp.json();
        shuffleActive = data.shuffle;
        updateShuffleButton();
    }

    async function toggleShuffle() {
        const newState = !shuffleActive;
        shuffleActive = newState;
        updateShuffleButton();
        await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cmd: 'shuffle', value: newState ? 'on' : 'off'})
        });
        setTimeout(async () => {
            const resp = await fetch('/api/loopmode');
            const data = await resp.json();
            shuffleActive = data.shuffle;
            updateShuffleButton();
            loadTracks();
        }, 500);
    }

    function updateShuffleButton() {
        const btn = document.getElementById('shuffleBtn');
        if (shuffleActive) btn.classList.add('active');
        else btn.classList.remove('active');
    }

    // ==================== Volume & Mute ====================
    async function fetchVolume() {
        const resp = await fetch('/api/volume');
        const vol = (await resp.json()).volume;
        document.getElementById('volumeSlider').value = vol;
        document.getElementById('volumeValue').innerText = vol;
    }

    async function setVolume(level) {
        await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cmd: 'volume', value: level})
        });
        document.getElementById('volumeValue').innerText = level;
    }

    async function getMuteStatus() {
        const resp = await fetch('/api/mute');
        const data = await resp.json();
        muted = data.muted;
        updateMuteButton();
    }

    async function toggleMute() {
        const newMuteState = !muted;
        await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cmd: 'mute', value: newMuteState ? 'on' : 'off'})
        });
        muted = newMuteState;
        updateMuteButton();
    }

    function updateMuteButton() {
        const muteBtn = document.getElementById('muteBtn');
        if (!muteBtn) return;
        const icon = muteBtn.querySelector('i');
        if (!icon) return;
        if (muted) {
            muteBtn.classList.add('muted');
            icon.setAttribute('data-feather', 'volume-x');
        } else {
            muteBtn.classList.remove('muted');
            icon.setAttribute('data-feather', 'volume-2');
        }
        feather.replace();
    }

    // ==================== Now Playing & Seeking ====================
    async function fetchStatus() {
        try {
            const resp = await fetch('/api/status');
            const status = await resp.json();
            currentStatus = status;
            document.getElementById('trackTitle').innerText = status.title || '-';
            document.getElementById('trackArtist').innerText = status.artist || '-';
            document.getElementById('trackAlbum').innerText = status.album || '-';
            document.getElementById('position').innerText = status.position || '00:00:00';
            document.getElementById('duration').innerText = status.duration || '00:00:00';
            const albumArtImg = document.getElementById('albumArt');
            if (status.album_art) {
                albumArtImg.src = status.album_art;
                albumArtImg.style.display = 'block';
                updateFaviconFromUrl(status.album_art, true);
            } else {
                albumArtImg.style.display = 'none';
                updateFaviconFromUrl('', true);
            }
            let qualityText = '-';
            if (status.quality) {
                let parts = [status.quality];
                if (status.sample_rate) {
                    let rate = parseInt(status.sample_rate);
                    if (rate >= 1000) parts.push((rate/1000).toFixed(1) + ' kHz');
                    else parts.push(rate + ' Hz');
                }
                if (status.bit_depth) parts.push(status.bit_depth + ' bit');
                if (status.bitrate) parts.push(status.bitrate + ' kbps');
                qualityText = parts.join(', ');
            }
            document.getElementById('quality').innerText = qualityText;
            updateSeekSlider();

            // Sync play/pause state using transport state
            const tsResp = await fetch('/api/transport_state');
            const tsData = await tsResp.json();
            if (tsData.playing !== isPlaying) {
                isPlaying = tsData.playing;
                updatePlayPauseIcon(isPlaying);
            }
        } catch(e) {
            console.error("fetchStatus error:", e);
        }
    }

    function updateSeekSlider() {
        if (seeking) return;
        const pos = currentStatus.position_sec || 0;
        const dur = currentStatus.duration_sec || 1;
        const percent = (pos / dur) * 100;
        const slider = document.getElementById('seekSlider');
        slider.value = percent;
        slider.max = 100;
    }

    async function seekTo(percent) {
        const dur = currentStatus.duration_sec || 1;
        const seconds = (percent / 100) * dur;
        await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cmd: 'seek', value: seconds})
        });
    }

    const slider = document.getElementById('seekSlider');
    slider.addEventListener('mousedown', () => { seeking = true; });
    slider.addEventListener('mouseup', (e) => {
        seeking = false;
        seekTo(parseFloat(e.target.value));
    });
    slider.addEventListener('touchstart', () => { seeking = true; });
    slider.addEventListener('touchend', (e) => {
        seeking = false;
        seekTo(parseFloat(e.target.value));
    });

    // ==================== Favicon ====================
    function setFavicon(url) {
        let link = document.querySelector("link[rel*='icon']");
        if (!link) {
            link = document.createElement('link');
            link.rel = 'icon';
            document.head.appendChild(link);
        }
        link.href = url;
    }

    function setDefaultFavicon() {
        const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#888"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>';
        const dataUrl = 'data:image/svg+xml,' + encodeURIComponent(svg);
        setFavicon(dataUrl);
    }

    function updateFaviconFromUrl(url, fallbackToDefault = true) {
        if (!url) {
            if (fallbackToDefault) setDefaultFavicon();
            return;
        }
        const img = new Image();
        img.onload = () => setFavicon(url);
        img.onerror = () => {
            console.warn("Album art load failed for favicon:", url);
            if (fallbackToDefault) setDefaultFavicon();
        };
        img.src = url;
    }

    // ==================== Initialisation ====================
    function initFeather() { feather.replace(); }

    document.getElementById('presetSelect').addEventListener('change', function(e) {
        const presetNum = e.target.value;
        if (presetNum) sendPreset(presetNum);
    });
    document.getElementById('filterInput').addEventListener('input', function(e) {
        filterKeyword = e.target.value.toLowerCase();
        filterTracks();
    });

    setInterval(fetchStatus, 1000);
    setInterval(getShuffleStatus, 5000);
    setInterval(updateCurrentPreset, 5000);
    fetchVolume();
    fetchStatus();
    loadTracks();
    getShuffleStatus();
    getMuteStatus();
    initFeather();
    updateCurrentPreset();
</script>
</body>
</html>
